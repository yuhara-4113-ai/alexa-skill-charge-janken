<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
      body { color: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.7; margin: 0; }
      main { box-sizing: border-box; margin: 0 auto; max-width: 760px; padding: 32px 20px 64px; }
      h1, h2 { line-height: 1.35; }
      h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
      h2 { margin-top: 1.8em; }
      a { color: #0969da; }
      footer { border-top: 1px solid #d0d7de; color: #57606a; margin-top: 3em; padding-top: 1em; }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
      <footer>チャージじゃんけん</footer>
    </main>
  </body>
</html>
